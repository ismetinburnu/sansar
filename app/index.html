<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SANSAR</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.0/dist/full.css" rel="stylesheet" type="text/css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    body { background-color: #0f172a; user-select: none; -webkit-tap-highlight-color: transparent; color: #f8fafc; font-family: ui-sans-serif, system-ui, sans-serif; }
    .hidden-area { display: none !important; }
    #toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; }
    @keyframes loadBar { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    .loading-bar { position: relative; width: 150px; height: 4px; background: #1e293b; border-radius: 10px; overflow: hidden; margin-top: 20px; }
    .loading-bar::after { content: ''; position: absolute; top: 0; left: 0; width: 50%; height: 100%; background: #38bdf8; border-radius: 10px; animation: loadBar 1s infinite ease-in-out; }
    .glass-nav { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.05); }
    .premium-card { background: #1e293b; border: 1px solid #334155; border-radius: 1rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); }
  </style>
</head>
<body class="overflow-x-hidden pb-24">

  <div id="toast-container"></div>

  <div id="splash-screen" class="fixed inset-0 z-[100] bg-[#0f172a] flex flex-col items-center justify-center">
    <img src="/logo.png" onerror="this.src='https://ui-avatars.com/api/?name=SANSAR&background=38bdf8&color=fff'" class="w-32 h-32 rounded-3xl shadow-[0_0_30px_rgba(56,189,248,0.3)]">
    <div class="loading-bar"></div>
  </div>

  <div id="error-screen" class="hidden-area flex-col items-center justify-center h-screen bg-[#0f172a] p-6 text-center">
    <i class='bx bx-shield-x text-7xl text-red-500'></i>
    <h1 class="text-3xl font-black mt-4 text-white">YETKİSİZ GİRİŞ</h1>
    <p class="mt-2 text-gray-400" id="error-msg">Sisteme erişim sağlanamadı.</p>
  </div>

  <div id="app-screen" class="hidden-area">
    <div class="navbar glass-nav fixed top-0 z-50">
      <div class="flex-1">
        <a class="btn btn-ghost normal-case text-2xl font-black text-[#38bdf8]"><i class='bx bxl-telegram mr-1'></i> SANSAR</a>
      </div>
      <div class="flex-none">
        <div class="avatar online"><div class="w-10 rounded-full ring-2 ring-[#38bdf8]"><img id="user-avatar" src="" /></div></div>
      </div>
    </div>

    <div class="mt-20 px-4 view-section" id="view-giveaways">
      <div class="tabs tabs-boxed bg-[#1e293b] mb-4 p-1" id="giveaway-tabs">
        <a class="tab tab-active text-white font-bold w-1/2" onclick="filterGiveaways('active')">Aktif</a>
        <a class="tab font-bold w-1/2 text-gray-400" onclick="filterGiveaways('ended')">Bitenler</a>
      </div>
      <div id="giveaways-list" class="flex flex-col gap-4"></div>
    </div>

    <div class="mt-20 px-4 view-section hidden-area" id="view-profile">
      <div class="premium-card p-6 flex flex-col items-center mb-4 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-24 bg-gradient-to-r from-[#0ea5e9] to-[#38bdf8] opacity-20"></div>
        <img id="profile-avatar-large" src="" class="w-24 h-24 rounded-full ring-4 ring-[#38bdf8] mb-3 relative z-10 shadow-2xl" />
        <h2 id="profile-name" class="text-2xl font-black text-white relative z-10"></h2>
        <p class="text-sm text-[#38bdf8] font-bold relative z-10" id="profile-username"></p>
        
        <div class="flex w-full mt-6 divide-x divide-gray-700 border-t border-gray-700 pt-4">
          <div class="flex-1 text-center">
            <p class="text-xs text-gray-400 uppercase font-bold">Katılınan</p>
            <p class="text-2xl font-black text-white" id="stat-part">0</p>
          </div>
          <div class="flex-1 text-center">
            <p class="text-xs text-gray-400 uppercase font-bold">Kazanılan</p>
            <p class="text-2xl font-black text-[#10b981]" id="stat-won">0</p>
          </div>
        </div>
      </div>
      <div class="premium-card p-5">
        <h3 class="font-black text-lg mb-4 text-white"><i class='bx bx-history text-[#38bdf8]'></i> Geçmiş</h3>
        <ul id="profile-history" class="space-y-3"></ul>
      </div>
    </div>

    <div class="mt-20 px-4 view-section hidden-area" id="view-admin">
      <div class="premium-card p-5 mb-5 border border-[#38bdf8]">
        <h2 class="text-xl font-black flex items-center gap-2 mb-4 text-white"><i class='bx bxs-crown text-[#38bdf8]'></i> Yeni Çekiliş</h2>
        <input type="text" id="admin-title" placeholder="Başlık" class="input input-bordered bg-[#0f172a] text-white w-full mb-3" />
        <textarea id="admin-desc" placeholder="Açıklama" class="textarea textarea-bordered bg-[#0f172a] text-white w-full mb-3 h-20"></textarea>
        <div class="flex gap-2 mb-3">
          <input type="number" id="admin-winners" placeholder="Kazanan Sayısı" class="input input-bordered bg-[#0f172a] text-white w-full" value="1" min="1" />
        </div>
        <button class="btn bg-[#38bdf8] hover:bg-[#0ea5e9] text-white w-full font-black border-none" onclick="adminAction('create')">Başlat</button>
      </div>
      <h3 class="text-lg font-black text-white mb-3">Yönetim Paneli</h3>
      <div id="admin-active-list" class="flex flex-col gap-3"></div>
    </div>

    <div class="btm-nav bg-[#1e293b] border-t border-gray-800 z-50 h-[70px]">
      <button class="active text-[#38bdf8]" onclick="switchTab('giveaways')">
        <i class='bx bxs-gift text-2xl'></i><span class="btm-nav-label text-[10px] font-bold">Çekilişler</span>
      </button>
      <button class="text-gray-400" onclick="switchTab('profile')">
        <i class='bx bxs-user text-2xl'></i><span class="btm-nav-label text-[10px] font-bold">Profil</span>
      </button>
      <button class="text-gray-400 hidden-area" id="nav-admin" onclick="switchTab('admin')">
        <i class='bx bxs-crown text-2xl'></i><span class="btm-nav-label text-[10px] font-bold">Admin</span>
      </button>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    const socket = io();

    let currentUser = null;
    let userIsAdmin = false;
    let allGiveaways = [];
    let currentTab = 'giveaways';

    window.onload = () => {
      if (!tg.initDataUnsafe || !tg.initDataUnsafe.user) {
        document.getElementById('splash-screen').style.display = 'none';
        document.getElementById('error-screen').style.display = 'flex';
        return;
      }
      
      currentUser = tg.initDataUnsafe.user;
      const avatarUrl = currentUser.photo_url || `https://ui-avatars.com/api/?name=${currentUser.first_name}&background=38bdf8&color=fff`;
      document.getElementById('user-avatar').src = avatarUrl;
      document.getElementById('profile-avatar-large').src = avatarUrl;
      document.getElementById('profile-name').innerText = currentUser.first_name;
      document.getElementById('profile-username').innerText = currentUser.username ? `@${currentUser.username}` : '';

      fetch('/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: currentUser.id, username: currentUser.username, firstName: currentUser.first_name })
      }).then(res => res.json()).then(data => {
        document.getElementById('splash-screen').style.display = 'none';
        if (data.success) {
          userIsAdmin = data.isAdmin;
          if(userIsAdmin) document.getElementById('nav-admin').classList.remove('hidden-area');
          document.getElementById('app-screen').classList.remove('hidden-area');
          loadData();
        } else {
          document.getElementById('error-msg').innerText = data.message;
          document.getElementById('error-screen').style.display = 'flex';
        }
      });
    };

    socket.on('data_updated', () => { loadData(); });

    function loadData() {
      fetch(`/api/giveaways/${currentUser.id}`).then(res => res.json()).then(data => {
        allGiveaways = data;
        if(currentTab === 'giveaways') filterGiveaways(document.querySelector('#giveaway-tabs .tab-active').innerText === 'Aktif' ? 'active' : 'ended', true);
        if(currentTab === 'admin' && userIsAdmin) loadAdminPanel();
      });
      fetch(`/api/profile/${currentUser.id}`).then(res => res.json()).then(data => {
        if(currentTab === 'profile') renderProfile(data);
      });
    }

    function showToast(message, type = "success") {
      const container = document.getElementById('toast-container');
      const bg = type === "success" ? "bg-[#10b981]" : "bg-red-500";
      const icon = type === "success" ? "bx-check-circle" : "bx-x-circle";
      const toast = document.createElement('div');
      toast.className = `p-3 rounded-lg shadow-2xl text-white font-bold flex items-center gap-2 mb-2 animate__animated animate__fadeInRight ${bg}`;
      toast.innerHTML = `<i class='bx ${icon} text-xl'></i> <span>${message}</span>`;
      container.appendChild(toast);
      tg.HapticFeedback.notificationOccurred(type);
      setTimeout(() => { toast.classList.replace('animate__fadeInRight', 'animate__fadeOutRight'); setTimeout(() => toast.remove(), 500); }, 3000);
    }

    function switchTab(tabId) {
      document.querySelectorAll('.btm-nav button').forEach(b => { b.classList.remove('active', 'text-[#38bdf8]'); b.classList.add('text-gray-400'); });
      event.currentTarget.classList.add('active', 'text-[#38bdf8]');
      event.currentTarget.classList.remove('text-gray-400');
      tg.HapticFeedback.impactOccurred('light');
      
      document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden-area'));
      document.getElementById(`view-${tabId}`).classList.remove('hidden-area');
      currentTab = tabId;
      loadData();
    }

    function filterGiveaways(status, isReload = false) {
      if(!isReload) {
        document.querySelectorAll('#giveaway-tabs a').forEach(a => { a.classList.remove('tab-active', 'text-white'); a.classList.add('text-gray-400'); });
        event.currentTarget.classList.add('tab-active', 'text-white');
        event.currentTarget.classList.remove('text-gray-400');
      }

      const container = document.getElementById('giveaways-list');
      container.innerHTML = '';
      
      const filtered = allGiveaways.filter(g => status === 'active' ? g.status !== 'ended' : g.status === 'ended');
      if(filtered.length === 0) { container.innerHTML = `<div class="text-center text-gray-500 mt-10"><i class='bx bx-ghost text-5xl'></i><p class="font-bold">Kayıt yok.</p></div>`; return; }

      filtered.forEach(g => {
        let actionHTML = "";
        if (g.status === 'ended') {
          const winners = g.winners_data ? JSON.parse(g.winners_data) : [];
          const didIWin = winners.some(w => w.id === currentUser.id);
          const wNames = winners.map(w => w.name).join(', ');
          actionHTML = `<div class="mt-4 p-3 rounded-lg ${didIWin ? 'bg-[#10b981] text-white' : 'bg-[#0f172a] text-gray-400'} text-center font-bold text-sm">
            <i class='bx bxs-crown text-lg'></i> Kazananlar: ${wNames || 'Yok'}</div>`;
          if(didIWin && !isReload) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        } else if (g.status === 'paused') {
          actionHTML = `<button class="btn btn-disabled w-full mt-4 font-black">Katılım Duraklatıldı</button>`;
        } else if (g.status === 'cancelled') {
          actionHTML = `<button class="btn btn-error w-full mt-4 font-black text-white cursor-default">İptal Edildi</button>`;
        } else {
          const btnClass = g.is_joined ? "btn-disabled bg-gray-700 text-gray-400" : "bg-[#38bdf8] text-white hover:bg-[#0ea5e9]";
          const btnText = g.is_joined ? "<i class='bx bx-check-double'></i> Katıldın" : "<i class='bx bx-party'></i> Hemen Katıl";
          actionHTML = `<button class="btn ${btnClass} w-full mt-4 border-none font-black" ${g.is_joined ? '' : `onclick="joinGiveaway(${g.id})"`}>${btnText}</button>`;
        }
        
        container.innerHTML += `
          <div class="premium-card p-5">
            <div class="flex items-center gap-3 mb-3 border-b border-gray-700 pb-3">
              <img src="${g.creator_photo || `https://ui-avatars.com/api/?name=${g.creator_name}`}" class="w-10 h-10 rounded-full" />
              <div><p class="text-[10px] text-gray-400 font-bold uppercase">Kurucu</p><p class="font-black text-sm text-[#38bdf8]">@${g.creator_name}</p></div>
              <div class="ml-auto"><div class="badge bg-[#0f172a] text-[#38bdf8] font-bold border-none"><i class='bx bx-user mr-1'></i> ${g.total_participants}</div></div>
            </div>
            <h2 class="text-xl font-black text-white">${g.title} <span class="text-xs font-normal text-gray-400 ml-2">(${g.winner_count} Kazanan)</span></h2>
            <p class="text-sm text-gray-400 mt-2">${g.description}</p>
            ${actionHTML}
          </div>`;
      });
    }

    function renderProfile(data) {
      document.getElementById('stat-part').innerText = data.participated.length;
      let wonCount = 0;
      const history = document.getElementById('profile-history');
      history.innerHTML = '';
      
      data.participated.forEach(g => {
        let isWin = false;
        let badge = `<span class="text-[#38bdf8] text-xs">Devam Ediyor</span>`;
        if(g.status === 'ended') {
          const w = g.winners_data ? JSON.parse(g.winners_data) : [];
          isWin = w.some(x => x.id === currentUser.id);
          if(isWin) { wonCount++; badge = `<span class="text-[#10b981] text-xs font-bold">Kazandın!</span>`; } 
          else badge = `<span class="text-gray-500 text-xs">Bitti</span>`;
        } else if (g.status === 'cancelled') badge = `<span class="text-red-500 text-xs">İptal</span>`;

        history.innerHTML += `<li class="flex justify-between items-center bg-[#0f172a] p-3 rounded-lg"><span class="font-bold text-white text-sm">${g.title}</span> ${badge}</li>`;
      });
      document.getElementById('stat-won').innerText = wonCount;
    }

    function joinGiveaway(id) {
      fetch('/api/join', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ giveawayId: id, userId: currentUser.id }) })
      .then(res => res.json()).then(data => {
        if(data.success) { showToast("Katıldın!"); confetti({ particleCount: 50 }); } 
        else showToast("Hata veya Katılım kapalı.", "error");
      });
    }

    function loadAdminPanel() {
      const container = document.getElementById('admin-active-list');
      container.innerHTML = '';
      allGiveaways.forEach(g => {
        container.innerHTML += `
          <div class="premium-card p-4 flex flex-col gap-2">
            <div class="flex justify-between items-center"><p class="font-black text-white">${g.title}</p><span class="badge badge-outline text-xs">${g.status}</span></div>
            <div class="flex gap-2 mt-2">
              <button class="btn btn-xs flex-1 ${g.status === 'paused' ? 'btn-success' : 'btn-warning'}" onclick="adminAction('status', ${g.id}, {status: '${g.status === 'paused' ? 'active' : 'paused'}'})">${g.status === 'paused' ? 'Başlat' : 'Duraklat'}</button>
              <button class="btn btn-xs btn-error flex-1" onclick="adminAction('status', ${g.id}, {status: 'cancelled'})">İptal</button>
            </div>
            <div class="flex gap-2">
              <button class="btn btn-sm bg-[#38bdf8] border-none text-white flex-1" onclick="adminAction('roll', ${g.id}, {winnerCount: ${g.winner_count}})">Çekilişi Bitir</button>
              ${g.status === 'ended' ? `<button class="btn btn-sm btn-neutral flex-1" onclick="adminReroll(${g.id})">Tekrar Çek</button>` : ''}
            </div>
          </div>`;
      });
    }

    function adminAction(action, id = null, extraData = {}) {
      let payload = { action, adminId: currentUser.id, data: { id, ...extraData } };
      
      if(action === 'create') {
        payload.data.title = document.getElementById('admin-title').value;
        payload.data.description = document.getElementById('admin-desc').value;
        payload.data.winnerCount = parseInt(document.getElementById('admin-winners').value) || 1;
        payload.data.creatorName = currentUser.username || currentUser.first_name;
        payload.data.creatorPhoto = document.getElementById('user-avatar').src;
        if(!payload.data.title || !payload.data.description) return showToast("Alanları doldurun.", "error");
      }

      fetch('/api/admin/action', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
      .then(res => res.json()).then(data => {
        if(data.success) {
          if(action === 'create') { document.getElementById('admin-title').value = ''; document.getElementById('admin-desc').value = ''; showToast("Başlatıldı!"); }
          else if(action === 'roll' || action === 'reroll') { showToast("Kazananlar Belirlendi!"); confetti(); }
        } else showToast(data.message || "İşlem başarısız", "error");
      });
    }

    function adminReroll(id) {
      const count = prompt("Kaç kişi tekrar çekilsin?", "1");
      if(count && parseInt(count) > 0) adminAction('reroll', id, { rerollCount: parseInt(count) });
    }
  </script>
</body>
  </html>
